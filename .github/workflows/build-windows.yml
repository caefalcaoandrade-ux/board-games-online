# Build standalone executables for Board Games Online.
#
# Builds Windows .exe, Linux binary, and macOS .app in parallel.
# Triggered manually from the GitHub Actions tab
# (Actions → Build Executables → Run workflow).

name: Build Executables

on:
  workflow_dispatch:

jobs:
  # ── Windows Build ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build .exe with PyInstaller
        run: pyinstaller BoardGamesOnline.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoardGamesOnline-Windows
          path: dist/BoardGamesOnline.exe

  # ── Linux Build ──────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Pygame on Linux needs SDL2 development libraries
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Linux binary with PyInstaller
        run: pyinstaller BoardGamesOnline.spec

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoardGamesOnline-Linux
          path: dist/BoardGamesOnline

  # ── macOS Build ─────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build macOS .app with PyInstaller
        run: pyinstaller BoardGamesOnline.spec

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp -R dist/BoardGamesOnline.app artifact/
          cp MAC_INSTRUCTIONS.txt artifact/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoardGamesOnline-macOS
          path: artifact/
